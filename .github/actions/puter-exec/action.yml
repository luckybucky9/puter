name: Puter reported command
description: Run a GitHub Actions command through Puter claim, failure report, and handoff.
inputs:
  command:
    description: Shell command to run after the Puter claim succeeds.
    required: true
  project:
    description: Puter project key.
    required: false
    default: puter
  issue:
    description: Linear issue identifier. Leave empty to infer from the branch name.
    required: false
    default: ""
  infer:
    description: Infer the issue identifier from the current branch when issue is empty.
    required: false
    default: "true"
  area:
    description: Comma-separated Puter area list.
    required: false
    default: ci
  validation:
    description: Validation text recorded during handoff when the command succeeds.
    required: false
    default: GitHub Actions command passed.
  api-url:
    description: Puter API base URL.
    required: false
    default: ""
  token:
    description: Puter API bearer token.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_ISSUE: ${{ inputs.issue }}
        INPUT_INFER: ${{ inputs.infer }}
        INPUT_AREA: ${{ inputs.area }}
        INPUT_VALIDATION: ${{ inputs.validation }}
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        if [ -n "${INPUT_API_URL}" ]; then
          export PUTER_API_URL="${INPUT_API_URL}"
        fi
        if [ -n "${INPUT_TOKEN}" ]; then
          export PUTER_API_TOKEN="${INPUT_TOKEN}"
        fi
        if [ -z "${PUTER_API_URL:-}" ]; then
          echo "::error::PUTER_API_URL or api-url input is required for Puter reporting."
          exit 1
        fi

        args=(exec --surface github --project "${INPUT_PROJECT}" --require-claim --handoff-on-exit --handoff-validation "${INPUT_VALIDATION}")

        if [ -n "${INPUT_AREA}" ]; then
          args+=(--area "${INPUT_AREA}")
        fi
        if [ -n "${INPUT_ISSUE}" ]; then
          args+=(--issue "${INPUT_ISSUE}")
        elif [ "${INPUT_INFER}" = "true" ]; then
          args+=(--infer)
        fi

        pnpm --filter @lucky9/puter-cli puter "${args[@]}" -- bash -lc "${INPUT_COMMAND}"
