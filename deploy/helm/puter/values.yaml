replicaCount: 1

image:
  repository: ghcr.io/luckybucky9/puter
  pullPolicy: IfNotPresent
  tag: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: puter.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

config:
  existingConfigMap: ""
  puterConfigJson: |
    {
      "projects": {}
    }

secrets:
  existingSecret: ""
  env: {}

env:
  PUTER_HOST: "0.0.0.0"
  PUTER_PORT: "8787"
  PUTER_CONFIG: "/etc/puter/puter.config.json"
