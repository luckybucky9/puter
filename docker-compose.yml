services:
  puter:
    build: .
    env_file:
      - .env
    environment:
      PUTER_HOST: 0.0.0.0
      PUTER_PORT: 8787
      PUTER_CONFIG: /app/puter.config.json
    ports:
      - "8787:8787"
    volumes:
      - ./puter.config.json:/app/puter.config.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
